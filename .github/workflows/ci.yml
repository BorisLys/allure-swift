name: CI

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "*.*.*"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  swift:
    name: Swift package
    runs-on: macos-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show toolchain versions
        run: |
          swift --version
          xcrun xcresulttool --help | head -3

      - name: Validate package manifest
        run: swift package describe

      - name: Build package and tests
        run: swift build --build-tests

      - name: Run tests
        run: swift test

      - name: Smoke test CLI against fixture
        run: |
          swift run allure-xcresult convert Tests/AllureXCResultTests/Resources/sample.xcresult \
            -o /tmp/smoke-allure-results --clean --verbose
          test -d /tmp/smoke-allure-results
          ls /tmp/smoke-allure-results
