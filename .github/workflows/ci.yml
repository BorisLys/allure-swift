name: CI

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "*.*.*"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  swift:
    name: Swift package
    runs-on: macos-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show toolchain versions
        run: swift --version

      - name: Validate package manifest
        run: swift package describe

      - name: Build
        run: swift build
